<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>java-openhab-test-suite · Test UI</title>
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
    --accent:#e8a045;--accent2:#4a9eff;--ok:#3ddc84;--fail:#ff5f57;--warn:#f5c542;
    --text:#e8eaf0;--muted:#6b7080;
    --mono:'JetBrains Mono','Fira Mono',monospace;
    --sans:'Inter',system-ui,sans-serif;--sidebar-w:210px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  header{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  header .logo{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;}
  header .subtitle{font-size:12px;color:var(--muted);font-family:var(--mono);}
  header .badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#2a1f0e;color:var(--accent);border:1px solid var(--accent);font-family:var(--mono);}
  header .status-pill{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .dot.on{background:var(--ok);}.dot.off{background:var(--fail);}
  #wake-bar{background:#12141e;border-bottom:1px solid var(--border);padding:7px 20px;display:flex;gap:10px;align-items:center;flex-shrink:0;font-size:12px;}
  #wake-status{color:var(--muted);font-family:var(--mono);}
  #btn-wake{background:#2a2d3a;color:var(--text);border:1px solid var(--border);padding:4px 10px;font-size:11px;border-radius:6px;cursor:pointer;}
  #connect-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
  #connect-bar input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;font-family:var(--mono);outline:none;}
  #connect-bar input:focus{border-color:var(--accent2);}
  #connect-bar input#inp-url{width:220px;}
  #connect-bar input#inp-user,#connect-bar input#inp-pass{width:150px;}
  #connect-bar input#inp-token{width:200px;}
  #connect-bar label{font-size:11px;color:var(--muted);}
  #connect-bar .sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
  button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;}
  button:hover{opacity:.85;}button:disabled{opacity:.4;cursor:not-allowed;}
  #btn-connect{background:var(--accent);color:#000;}
  .btn-run{background:var(--accent2);color:#fff;}
  .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .main{display:flex;flex:1;overflow:hidden;}
  aside{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
  .sidebar-section{padding:8px 0;border-bottom:1px solid var(--border);}
  .sidebar-section-title{padding:4px 14px;font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;}
  .class-btn{display:block;width:100%;text-align:left;padding:7px 14px;background:transparent;border:none;color:var(--text);font-size:12px;font-family:var(--mono);cursor:pointer;border-radius:0;font-weight:400;transition:background .1s;}
  .class-btn:hover{background:var(--border);opacity:1;}
  .class-btn.active{background:#221a0f;color:var(--accent);border-left:2px solid var(--accent);}
  .content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #class-title{font-size:15px;font-weight:700;color:var(--accent);font-family:var(--mono);padding:12px 16px 0;}
  #class-desc{font-size:11px;color:var(--muted);padding:2px 16px 8px;}
  #form-pane{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;overflow-y:auto;max-height:50%;flex-shrink:0;}
  .method-block{margin-bottom:14px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;}
  .method-name{font-size:12px;font-weight:700;color:var(--accent2);font-family:var(--mono);margin-bottom:8px;}
  .fields{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:3px;}
  .field label{font-size:10px;color:var(--muted);}
  .field input,.field select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:12px;font-family:var(--mono);outline:none;min-width:120px;}
  .field input:focus,.field select:focus{border-color:var(--accent2);}
  .field input.w-sm{width:90px;}.field input.w-md{width:150px;}.field input.w-lg{width:220px;}
  .result-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono);font-weight:700;}
  .result-badge.ok{background:#0d2e1a;color:var(--ok);border:1px solid var(--ok);}
  .result-badge.fail{background:#2e0d0d;color:var(--fail);border:1px solid var(--fail);}
  .result-badge.pend{background:#1a1400;color:var(--warn);border:1px solid var(--warn);}
  #stats-bar{display:flex;gap:16px;padding:8px 16px;border-bottom:1px solid var(--border);font-size:12px;flex-shrink:0;}
  .stat .n{font-weight:700;font-family:var(--mono);}
  .stat.ok-s .n{color:var(--ok);}.stat.fail-s .n{color:var(--fail);}.stat.pend-s .n{color:var(--warn);}
  .stat-label{color:var(--muted);}
  #output{flex:1;overflow-y:auto;padding:12px 16px;font-family:var(--mono);font-size:12px;line-height:1.7;}
  .out-line{margin-bottom:2px;display:flex;gap:8px;}
  .out-line .ts{color:var(--muted);font-size:11px;min-width:70px;}
  .out-ok .icon{color:var(--ok);}.out-fail .icon{color:var(--fail);}.out-info .icon{color:var(--accent2);}
  .out-line .msg{word-break:break-all;white-space:pre-wrap;}
  #progress{display:none;position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:prog 1.5s ease-in-out infinite;}
  @keyframes prog{0%{transform:scaleX(0);transform-origin:left}100%{transform:scaleX(1);transform-origin:left}}
</style>
</head>
<body>
<div id="progress"></div>
<header>
  <span class="logo">openHAB</span>
  <span class="subtitle">java-openhab-test-suite</span>
  <span class="badge">Java 11</span>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</header>

<div id="wake-bar">
  <span id="wake-status">⏳ Waking up backend (Render Free Tier – please wait…)</span>
  <button id="btn-wake">↺ Wake manually</button>
</div>

<div id="connect-bar">
  <label>URL <input id="inp-url" type="text" value="https://myopenhab.org" placeholder="https://myopenhab.org"></label>
  <label>Username <input id="inp-user" type="text" placeholder="user@example.com"></label>
  <label>Password <input id="inp-pass" type="password" placeholder="••••••••"></label>
  <div class="sep"></div>
  <label>API Token (opt.) <input id="inp-token" type="text" placeholder="oh.openhab.xxx"></label>
  <button id="btn-connect" disabled>Connect</button>
</div>

<div class="main">
  <aside>
    <div id="class-list">
      <div style="padding:20px 14px;font-size:12px;color:var(--muted)">Please connect first.</div>
    </div>
  </aside>
  <div class="content">
    <div id="class-title">openHAB Test Suite</div>
    <div id="class-desc">Select a tester from the sidebar.</div>
    <div id="form-pane"></div>
    <div id="stats-bar">
      <div class="stat"><span class="n" id="s-total">0</span><span class="stat-label"> Tests</span></div>
      <div class="stat ok-s"><span class="n" id="s-ok">0</span><span class="stat-label"> ✓</span></div>
      <div class="stat fail-s"><span class="n" id="s-fail">0</span><span class="stat-label"> ✗</span></div>
      <div class="stat pend-s"><span class="n" id="s-pend">0</span><span class="stat-label"> ⏳</span></div>
      <div style="margin-left:auto"><button class="btn-clear" id="btn-clear">✕ Clear log</button></div>
    </div>
    <div id="output"><div style="color:var(--muted);padding:4px 0">Select a tester from the sidebar to get started.</div></div>
  </div>
</div>

<script>
const BACKEND = 'https://java-openhab-test-suite-backend.onrender.com';
let CREDS = null;
let stats = { total:0, ok:0, fail:0, pend:0 };

// ── Wake-up ───────────────────────────────────────────────────────────────────
async function wakeBackend() {
  const ws  = document.getElementById('wake-status');
  const btn = document.getElementById('btn-connect');
  document.getElementById('progress').style.display = 'block';
  ws.style.color = '';
  let attempts = 0;
  while (attempts < 20) {
    try {
      const r = await fetch(BACKEND + '/', { method:'GET', signal:AbortSignal.timeout(5000) });
      if (r.ok) {
        ws.textContent = '✓ Backend ready';
        ws.style.color = 'var(--ok)';
        btn.disabled   = false;
        document.getElementById('progress').style.display = 'none';
        return;
      }
    } catch(e) {}
    attempts++;
    ws.textContent = `⏳ Waiting for backend… (${attempts}/20)`;
    await new Promise(r => setTimeout(r, 3000));
  }
  ws.textContent   = '⚠ Backend not responding – try waking manually';
  ws.style.color   = 'var(--fail)';
  btn.disabled     = false;
  document.getElementById('progress').style.display = 'none';
}
document.getElementById('btn-wake').addEventListener('click', wakeBackend);
wakeBackend();

// ── Tester definitions ────────────────────────────────────────────────────────
const TESTERS = {
  ItemTester: {
    desc: 'Validates item existence, type, state and sends commands with SSE verification.',
    methods: [
      { name:'doesItemExist',      label:'Does Item Exist?',
        fields:[ {id:'itemName', label:'Item Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'ItemTester', method:'doesItemExist', params:[f.itemName]}) },
      { name:'checkItemIsType',    label:'Check Item Is Type',
        fields:[ {id:'itemName', label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'itemType', label:'Type', type:'select',
                  opts:['Switch','Dimmer','Color','Contact','Rollershutter','Number','Player','DateTime','Location','Image','String','Group']} ],
        build: f => ({tester:'ItemTester', method:'checkItemIsType', params:[f.itemName, f.itemType]}) },
      { name:'checkItemHasState',  label:'Check Item Has State',
        fields:[ {id:'itemName', label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'state',    label:'Expected State', ph:'ON', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'checkItemHasState', params:[f.itemName, f.state]}) },
      { name:'testSwitch',         label:'Test Switch Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'command',      label:'Command', type:'select', opts:['ON','OFF']},
                 {id:'expectedState',label:'Expected State', ph:'ON', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testSwitch', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testDimmer',         label:'Test Dimmer Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testDimmer', cls:'w-md'},
                 {id:'command',      label:'Command', ph:'50', cls:'w-sm'},
                 {id:'expectedState',label:'Expected State', ph:'50', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testDimmer', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testColor',          label:'Test Color Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testColor', cls:'w-md'},
                 {id:'command',      label:'Command (H,S,B)', ph:'240,100,100', cls:'w-md'},
                 {id:'expectedState',label:'Expected State', ph:'240,100,100', cls:'w-md'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testColor', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testContact',        label:'Test Contact Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testContact', cls:'w-md'},
                 {id:'update',       label:'Update', type:'select', opts:['OPEN','CLOSED']},
                 {id:'expectedState',label:'Expected State', ph:'OPEN', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testContact', params:[f.itemName,f.update,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testRollershutter',  label:'Test Rollershutter Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testRollershutter', cls:'w-md'},
                 {id:'command',      label:'Command', type:'select', opts:['UP','DOWN','STOP','MOVE','0','50','100']},
                 {id:'expectedState',label:'Expected State', ph:'100', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testRollershutter', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testNumber',         label:'Test Number Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testNumber', cls:'w-md'},
                 {id:'command',      label:'Value', ph:'42', cls:'w-sm'},
                 {id:'expectedState',label:'Expected State', ph:'42', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testNumber', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testPlayer',         label:'Test Player Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testPlayer', cls:'w-md'},
                 {id:'command',      label:'Command', type:'select', opts:['PLAY','PAUSE','NEXT','PREVIOUS','REWIND','FASTFORWARD']},
                 {id:'expectedState',label:'Expected State', ph:'PLAY', cls:'w-sm'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testPlayer', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'testDateTime',       label:'Test DateTime Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testDateTime', cls:'w-md'},
                 {id:'command',      label:'ISO-8601 Value', ph:'2024-01-15T08:30:00+0000', cls:'w-lg'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testDateTime', params:[f.itemName,f.command,null,parseInt(f.timeout)||10]}) },
      { name:'testLocation',       label:'Test Location Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testLocation', cls:'w-md'},
                 {id:'update',       label:'lat,lon[,alt]', ph:'48.7758,9.1829', cls:'w-md'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testLocation', params:[f.itemName,f.update,null,parseInt(f.timeout)||10]}) },
      { name:'testString',         label:'Test String Item',
        fields:[ {id:'itemName',     label:'Item Name', ph:'testString', cls:'w-md'},
                 {id:'command',      label:'Value', ph:'Hello openHAB', cls:'w-lg'},
                 {id:'expectedState',label:'Expected State', ph:'Hello openHAB', cls:'w-lg'},
                 {id:'timeout',      label:'Timeout (s)', ph:'10', cls:'w-sm'} ],
        build: f => ({tester:'ItemTester', method:'testString', params:[f.itemName,f.command,f.expectedState||null,parseInt(f.timeout)||10]}) },
      { name:'isGroupItem',        label:'Is Group Item?',
        fields:[ {id:'itemName', label:'Item Name', ph:'testGroup', cls:'w-md'} ],
        build: f => ({tester:'ItemTester', method:'isGroupItem', params:[f.itemName]}) },
      { name:'doesGroupContainMember', label:'Group Contains Member?',
        fields:[ {id:'groupName',  label:'Group Name', ph:'testGroup', cls:'w-md'},
                 {id:'memberName', label:'Member Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'ItemTester', method:'doesGroupContainMember', params:[f.groupName,f.memberName]}) },
    ]
  },

  ThingTester: {
    desc: 'Checks Thing status (ONLINE/OFFLINE/…) and enables or disables Things.',
    methods: [
      { name:'isThingOnline',       label:'Is Thing ONLINE?',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'isThingOnline', params:[f.thingUID]}) },
      { name:'isThingOffline',      label:'Is Thing OFFLINE?',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'isThingOffline', params:[f.thingUID]}) },
      { name:'isThingStatus',       label:'Check Thing Status',
        fields:[ {id:'thingUID',      label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'},
                 {id:'statusToCheck', label:'Expected Status', type:'select',
                  opts:['ONLINE','OFFLINE','PENDING','UNKNOWN','UNINITIALIZED','ERROR']} ],
        build: f => ({tester:'ThingTester', method:'isThingStatus', params:[f.thingUID,f.statusToCheck]}) },
      { name:'isThingError',        label:'Is Thing in ERROR?',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'isThingError', params:[f.thingUID]}) },
      { name:'isThingUninitialized',label:'Is Thing UNINITIALIZED?',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'isThingUninitialized', params:[f.thingUID]}) },
      { name:'enableThing',         label:'Enable Thing',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'enableThing', params:[f.thingUID]}) },
      { name:'disableThing',        label:'Disable Thing',
        fields:[ {id:'thingUID', label:'Thing UID', ph:'astro:sun:local', cls:'w-lg'} ],
        build: f => ({tester:'ThingTester', method:'disableThing', params:[f.thingUID]}) },
    ]
  },

  RuleTester: {
    desc: 'Runs, enables, disables rules and checks their execution status.',
    methods: [
      { name:'getRuleStatus',      label:'Get Rule Status',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'getRuleStatus', params:[f.ruleUID]}) },
      { name:'isRuleActive',       label:'Is Rule Active?',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'isRuleActive', params:[f.ruleUID]}) },
      { name:'isRuleDisabled',     label:'Is Rule Disabled?',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'isRuleDisabled', params:[f.ruleUID]}) },
      { name:'isRuleRunning',      label:'Is Rule Running?',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'isRuleRunning', params:[f.ruleUID]}) },
      { name:'isRuleIdle',         label:'Is Rule Idle?',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'isRuleIdle', params:[f.ruleUID]}) },
      { name:'enableRule',         label:'Enable Rule',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'enableRule', params:[f.ruleUID]}) },
      { name:'disableRule',        label:'Disable Rule',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'disableRule', params:[f.ruleUID]}) },
      { name:'runRule',            label:'Run Rule Now',
        fields:[ {id:'ruleUID', label:'Rule UID', ph:'my-rule-1', cls:'w-lg'} ],
        build: f => ({tester:'RuleTester', method:'runRule', params:[f.ruleUID]}) },
      { name:'testRuleExecution',  label:'Test Rule Execution',
        fields:[ {id:'ruleUID',      label:'Rule UID', ph:'my-rule-1', cls:'w-lg'},
                 {id:'expectedItem', label:'Expected Item', ph:'testColor', cls:'w-md'},
                 {id:'expectedValue',label:'Expected Value', ph:'240,100,100', cls:'w-md'} ],
        build: f => ({tester:'RuleTester', method:'testRuleExecution', params:[f.ruleUID,f.expectedItem,f.expectedValue]}) },
    ]
  },

  ChannelTester: {
    desc: 'Verifies item-channel links and detects orphaned links.',
    methods: [
      { name:'isItemLinkedToChannel',  label:'Is Item Linked to Channel?',
        fields:[ {id:'itemName',   label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'channelUID', label:'Channel UID', ph:'astro:moon:local:phase#name', cls:'w-lg'} ],
        build: f => ({tester:'ChannelTester', method:'isItemLinkedToChannel', params:[f.itemName,f.channelUID]}) },
      { name:'getLinksForItem',        label:'Get All Links for Item',
        fields:[ {id:'itemName', label:'Item Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'ChannelTester', method:'getLinksForItem', params:[f.itemName]}) },
      { name:'isItemLinkedToAnyChannel', label:'Is Item Linked to Any Channel?',
        fields:[ {id:'itemName', label:'Item Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'ChannelTester', method:'isItemLinkedToAnyChannel', params:[f.itemName]}) },
      { name:'hasOrphanedLinks',       label:'Has Orphaned Links?',
        fields:[],
        build: f => ({tester:'ChannelTester', method:'hasOrphanedLinks', params:[]}) },
    ]
  },

  PersistenceTester: {
    desc: 'Checks item registration in persistence services and historical data.',
    methods: [
      { name:'isItemPersisted',        label:'Is Item Persisted?',
        fields:[ {id:'serviceID', label:'Service ID', ph:'rrd4j', cls:'w-sm'},
                 {id:'itemName',  label:'Item Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'PersistenceTester', method:'isItemPersisted', params:[f.serviceID,f.itemName]}) },
      { name:'hasDataInRange',         label:'Has Data in Time Range?',
        fields:[ {id:'serviceID', label:'Service ID', ph:'rrd4j', cls:'w-sm'},
                 {id:'itemName',  label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'startTime', label:'Start (ISO-8601)', ph:'2025-01-01T00:00:00.000Z', cls:'w-lg'},
                 {id:'endTime',   label:'End (ISO-8601)',   ph:'2025-12-31T23:59:59.999Z', cls:'w-lg'} ],
        build: f => ({tester:'PersistenceTester', method:'hasDataInRange', params:[f.serviceID,f.itemName,f.startTime,f.endTime]}) },
      { name:'checkLastPersistedState',label:'Check Last Persisted State',
        fields:[ {id:'serviceID',    label:'Service ID', ph:'rrd4j', cls:'w-sm'},
                 {id:'itemName',     label:'Item Name', ph:'testSwitch', cls:'w-md'},
                 {id:'expectedState',label:'Expected State', ph:'ON', cls:'w-sm'} ],
        build: f => ({tester:'PersistenceTester', method:'checkLastPersistedState', params:[f.serviceID,f.itemName,f.expectedState]}) },
    ]
  },

  SitemapTester: {
    desc: 'Verifies sitemap existence and checks whether items appear in sitemaps.',
    methods: [
      { name:'doesSitemapExist',       label:'Does Sitemap Exist?',
        fields:[ {id:'sitemapName', label:'Sitemap Name', ph:'default', cls:'w-md'} ],
        build: f => ({tester:'SitemapTester', method:'doesSitemapExist', params:[f.sitemapName]}) },
      { name:'doesSitemapContainItem', label:'Does Sitemap Contain Item?',
        fields:[ {id:'sitemapName', label:'Sitemap Name', ph:'default', cls:'w-md'},
                 {id:'itemName',    label:'Item Name', ph:'testSwitch', cls:'w-md'} ],
        build: f => ({tester:'SitemapTester', method:'doesSitemapContainItem', params:[f.sitemapName,f.itemName]}) },
    ]
  },
};

const SECTIONS = {
  'Items':       ['ItemTester'],
  'Things':      ['ThingTester'],
  'Rules':       ['RuleTester'],
  'Channels':    ['ChannelTester'],
  'Persistence': ['PersistenceTester'],
  'Sitemaps':    ['SitemapTester'],
};

const $   = id => document.getElementById(id);
const ts  = () => new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

function log(type, msg) {
  const icons = {ok:'✓', fail:'✗', info:'ℹ'};
  const out   = $('output');
  const line  = document.createElement('div');
  line.className = `out-line out-${type}`;
  line.innerHTML = `<span class="ts">${ts()}</span><span class="icon">${icons[type]||'·'}</span><span class="msg">${String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

function updateStats() {
  $('s-total').textContent = stats.total;
  $('s-ok').textContent    = stats.ok;
  $('s-fail').textContent  = stats.fail;
  $('s-pend').textContent  = stats.pend;
}

async function callBackend(payload) {
  const res = await fetch(BACKEND + '/api/test', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({...CREDS, ...payload})
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt}`);
  }
  return res.json();
}

$('btn-connect').addEventListener('click', async () => {
  CREDS = {
    url:      $('inp-url').value.trim().replace(/\/+$/, ''),
    username: $('inp-user').value.trim()  || null,
    password: $('inp-pass').value.trim()  || null,
    token:    $('inp-token').value.trim() || null,
  };
  log('info', `Connecting to ${CREDS.url}…`);
  try {
    const res  = await fetch(BACKEND + '/api/connect', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(CREDS)
    });
    const data = await res.json();
    if (data.loggedIn) {
      $('status-dot').className    = 'dot on';
      $('status-text').textContent = `Connected · ${data.isCloud ? 'Cloud' : 'Local'}`;
      log('ok', `Connected — isCloud=${data.isCloud}`);
      buildSidebar();
    } else {
      log('fail', 'Login failed — check credentials');
      $('status-dot').className = 'dot off';
    }
  } catch(e) { log('fail', `Error: ${e.message}`); }
});

function buildSidebar() {
  const list = $('class-list');
  list.innerHTML = '';
  for (const [section, testers] of Object.entries(SECTIONS)) {
    const sec   = document.createElement('div'); sec.className = 'sidebar-section';
    const title = document.createElement('div'); title.className = 'sidebar-section-title'; title.textContent = section;
    sec.appendChild(title);
    for (const name of testers) {
      const btn = document.createElement('button'); btn.className = 'class-btn'; btn.textContent = name;
      btn.addEventListener('click', () => selectTester(name, btn));
      sec.appendChild(btn);
    }
    list.appendChild(sec);
  }
}

function selectTester(name, btn) {
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $('class-title').textContent = name;
  $('class-desc').textContent  = TESTERS[name].desc;
  buildFormPane(name);
}

function buildFormPane(testerName) {
  const pane    = $('form-pane');
  pane.innerHTML = '';
  const tester  = TESTERS[testerName];
  for (const method of tester.methods) {
    const block   = document.createElement('div'); block.className = 'method-block';
    const title   = document.createElement('div'); title.className = 'method-name'; title.textContent = method.label;
    const fields  = document.createElement('div'); fields.className = 'fields';
    const fieldMap = {};

    for (const f of method.fields) {
      const wrap = document.createElement('div'); wrap.className = 'field';
      const lbl  = document.createElement('label'); lbl.textContent = f.label;
      let el;
      if (f.type === 'select') {
        el = document.createElement('select');
        for (const o of f.opts) { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; el.appendChild(opt); }
      } else {
        el = document.createElement('input'); el.type = 'text'; el.placeholder = f.ph || '';
        if (f.cls) el.classList.add(f.cls);
      }
      el.id = `${testerName}_${method.name}_${f.id}`;
      fieldMap[f.id] = el;
      wrap.appendChild(lbl); wrap.appendChild(el);
      fields.appendChild(wrap);
    }

    const badge  = document.createElement('span'); badge.className = 'result-badge pend'; badge.textContent = '–';
    const runBtn = document.createElement('button'); runBtn.className = 'btn-run'; runBtn.textContent = '▶ Run';
    runBtn.addEventListener('click', async () => {
      const vals = {};
      for (const [k, el] of Object.entries(fieldMap)) vals[k] = el.value.trim();
      const payload = method.build(vals);
      badge.className = 'result-badge pend'; badge.textContent = '⏳';
      stats.pend++; updateStats();
      $('progress').style.display = 'block';
      try {
        const data = await callBackend(payload);
        stats.pend--; stats.total++;
        const ok = data.result === true || data.result === 'true';
        if (typeof data.result === 'boolean' || data.result === 'true' || data.result === 'false') {
          if (ok) { stats.ok++;   badge.className = 'result-badge ok';   badge.textContent = '✓ true'; }
          else    { stats.fail++; badge.className = 'result-badge fail'; badge.textContent = '✗ false'; }
          log(ok ? 'ok' : 'fail', `${testerName}.${method.name}() → ${data.result}${data.output ? '\n' + data.output : ''}`);
        } else {
          stats.ok++;
          badge.className = 'result-badge ok'; badge.textContent = '✓';
          log('ok', `${testerName}.${method.name}() → ${JSON.stringify(data.result)}`);
        }
      } catch(e) {
        stats.pend--; stats.total++; stats.fail++;
        badge.className = 'result-badge fail'; badge.textContent = '✗ error';
        log('fail', `${testerName}.${method.name}(): ${e.message}`);
      }
      updateStats();
      $('progress').style.display = 'none';
    });

    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'display:flex;gap:8px;align-items:center;margin-top:2px;';
    btnWrap.appendChild(runBtn);
    btnWrap.appendChild(badge);
    fields.appendChild(btnWrap);
    block.appendChild(title);
    block.appendChild(fields);
    pane.appendChild(block);
  }
}

$('btn-clear').addEventListener('click', () => {
  $('output').innerHTML = '';
  stats = {total:0, ok:0, fail:0, pend:0};
  updateStats();
  document.querySelectorAll('.result-badge').forEach(b => { b.className='result-badge pend'; b.textContent='–'; });
});

$('method-select')?.remove();
</script>
</body>
